<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stopwatch</title>
    <style>
        body {
            background: #ffe4ef;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .stopwatch-container {
            background: #fff0f6;
            border: 2px solid #e75480;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 4px 16px rgba(231, 84, 128, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time {
            font-size: 3rem;
            color: #e75480;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .btn {
            background: #e75480;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 28px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }
        .btn:hover {
            background: #c2185b;
        }
        .laps {
            width: 100%;
            margin-top: 10px;
            max-height: 180px;
            overflow-y: auto;
            background: #fff8fa;
            border-radius: 10px;
            border: 1px solid #e75480;
            padding: 10px;
        }
        .lap {
            color: #e75480;
            font-size: 1rem;
            margin: 4px 0;
            font-weight: 500;
        }
        .laps-title {
            color: #c2185b;
            font-size: 1.1rem;
            margin-bottom: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 style="color:#e75480; margin-bottom: 20px; font-size: 4rem;">STOPWATCH!</h1>
    <div class="stopwatch-container">
        <div class="time" id="display">00:00:00.00</div>
        <div class="buttons">
            <button class="btn" id="start">Start</button>
            <button class="btn" id="pause">Pause</button>
            <button class="btn" id="reset">Reset</button>
            <button class="btn" id="lap">Lap</button>
        </div>
        <div class="laps">
            <div class="laps-title">Lap Times</div>
            <div id="laps-list"></div>
        </div>
    </div>
    <script>
        let startTime = 0;
        let elapsed = 0;
        let timerInterval = null;
        let laps = [];

        const display = document.getElementById('display');
        const startBtn = document.getElementById('start');
        const pauseBtn = document.getElementById('pause');
        const resetBtn = document.getElementById('reset');
        const lapBtn = document.getElementById('lap');
        const lapsList = document.getElementById('laps-list');

        function formatTime(ms) {
            const centiseconds = Math.floor((ms % 1000) / 10);
            const seconds = Math.floor((ms / 1000) % 60);
            const minutes = Math.floor((ms / 60000) % 60);
            const hours = Math.floor(ms / 3600000);
            return (
                (hours ? String(hours).padStart(2, '0') + ':' : '') +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0') + '.' +
                String(centiseconds).padStart(2, '0')
            );
        }

        function updateDisplay() {
            display.textContent = formatTime(elapsed);
        }

        function start() {
            if (!timerInterval) {
                startTime = Date.now() - elapsed;
                timerInterval = setInterval(() => {
                    elapsed = Date.now() - startTime;
                    updateDisplay();
                }, 10);
                lapBtn.disabled = false;
            }
        }

        function pause() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                lapBtn.disabled = true;
            }
        }

        function reset() {
            pause();
            elapsed = 0;
            laps = [];
            updateDisplay();
            renderLaps();
            lapBtn.disabled = true;
        }

        function lap() {
            if (timerInterval) {
                laps.push(elapsed);
                renderLaps();
            }
        }

        function renderLaps() {
            lapsList.innerHTML = '';
            laps.forEach((lapTime, idx) => {
                const div = document.createElement('div');
                div.className = 'lap';
                div.textContent = `Lap ${idx + 1}: ${formatTime(lapTime)}`;
                lapsList.appendChild(div);
            });
        }

        startBtn.addEventListener('click', start);
        pauseBtn.addEventListener('click', pause);
        resetBtn.addEventListener('click', reset);
        lapBtn.addEventListener('click', lap);

        updateDisplay();
        lapBtn.disabled = true;
    </script>
</body>
</html>
